<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIKINGOS GYM — Canalejas, Jilotepec</title>
    <meta name="description" content="Vikingos Gym — Tu gimnasio en Canalejas, Jilotepec, Estado de México. Equipo de cardio y fuerza de nivel profesional, entrenadores certificados y membresías accesibles." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      Formulario estático para que Netlify detecte los campos durante el deploy.
      El formulario visible se encuentra en React y envía los mismos datos.
    -->
    <form
      name="contacto-vikingos"
      method="POST"
      action="/gracias.html"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="contacto-vikingos" />
      <input type="text" name="nombre" />
      <input type="email" name="email" />
      <textarea name="mensaje"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
