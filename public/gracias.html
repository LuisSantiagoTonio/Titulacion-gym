<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Mensaje enviado | Vikingos Gym</title>
    <style>
      :root { color-scheme: dark; font-family: Arial, sans-serif; }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #090b0e;
        color: #f6f1e8;
      }
      main {
        width: min(560px, 100%);
        padding: 36px;
        border: 1px solid #30343a;
        border-radius: 20px;
        background: #14171b;
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, .45);
      }
      .mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: #f59e0b;
        color: #111318;
        font-size: 34px;
        font-weight: 800;
      }
      h1 { margin: 0; font-size: clamp(28px, 7vw, 42px); text-transform: uppercase; }
      p { color: #b6bbc4; line-height: 1.65; }
      a {
        display: inline-block;
        margin-top: 12px;
        padding: 13px 22px;
        border-radius: 12px;
        background: #f59e0b;
        color: #111318;
        font-weight: 800;
        text-decoration: none;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">✓</div>
      <h1>Mensaje enviado</h1>
      <p>Gracias por contactar a Vikingos Gym. Recibimos tus datos y podremos responderte por correo.</p>
      <a href="/#contacto-section">Volver a la página</a>
    </main>
  </body>
</html>
